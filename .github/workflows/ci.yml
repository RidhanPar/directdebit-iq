name: DirectDebit IQ CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic payment data
        run: python data/generate_data.py

      - name: Run pytest
        run: pytest -q

      - name: Run focused action-service lint
        run: ruff check api app/action_api_client.py src/operations_agent.py tests/test_action_api.py tests/test_deployment_artifacts.py evaluations/run_action_evaluation.py

      - name: Run action workflow governance evaluation
        run: python evaluations/run_action_evaluation.py

  code-quality:
    name: Run Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Compile Python files
        run: |
          python -m py_compile streamlit_app.py
          python -m py_compile app/dashboard.py
          python -m py_compile app/pages.py
          python -m py_compile api/*.py
          python -m py_compile src/*.py
          python -m py_compile data/generate_data.py

      - name: Check project structure
        run: |
          test -f README.md
          test -f requirements.txt
          test -f streamlit_app.py
          test -f app/dashboard.py
          test -f app/pages.py
          test -f api/main.py
          test -f automation/n8n_retry_approval_workflow.json
          test -f evaluations/action_workflow_cases.json
          test -f docs/SECURITY_AND_GOVERNANCE.md
          test -f src/train.py
          test -f src/feature_store.py
          test -f src/sql_runner.py
          test -f sql/01_monthly_success_rates.sql
          test -f sql/02_merchant_cohort_analysis.sql
          test -f sql/03_high_risk_customers.sql
          test -f sql/04_bank_country_analysis.sql

  validate-build:
    name: Validate Build and App Startup
    runs-on: ubuntu-latest
    needs: [unit-tests, code-quality]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate data and run SQL analytics
        run: |
          python data/generate_data.py
          python src/sql_runner.py

      - name: Validate Streamlit entry point
        run: |
          timeout 20s streamlit run streamlit_app.py --server.headless true --server.port 8501 || code=$?
          if [ "${code:-0}" -ne 0 ] && [ "${code:-0}" -ne 124 ]; then
            exit "$code"
          fi

      - name: Validate action API health
        run: |
          uvicorn api.main:app --host 127.0.0.1 --port 8000 &
          api_pid=$!
          sleep 5
          curl --fail http://127.0.0.1:8000/health
          kill "$api_pid"

      - name: Validate API container build
        run: docker build -f Dockerfile.api -t directdebit-iq-action-api .
